<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a6e4a" />
    <meta name="color-scheme" content="light dark" />

    <!-- Set the theme before first paint to avoid a light-mode flash. Reads the
         saved choice, else falls back to the OS preference. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('playpin-theme')
          if (t !== 'dark' && t !== 'light') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          }
          document.documentElement.setAttribute('data-theme', t)
        } catch (e) {}
      })()
    </script>

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Primary meta -->
    <title>PlayPin — Never play alone</title>
    <meta name="description" content="Find pickup games near you — drop a pin, people join, show up and play. Football, cricket, badminton, basketball, tennis, pickleball and more." />

    <!-- ⬇️ REPLACE this with your real production URL once you have a stable domain.
         It is the ONLY place the canonical/social URL is set. -->
    <link rel="canonical" href="https://playpin.vercel.app/" />

    <!-- Open Graph (Facebook, LinkedIn, iMessage, WhatsApp, Slack…) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PlayPin" />
    <meta property="og:title" content="PlayPin — Never play alone" />
    <meta property="og:description" content="Find pickup games near you — real people, real time, one tap away." />
    <meta property="og:url" content="https://playpin.vercel.app/" />
    <meta property="og:image" content="https://playpin.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PlayPin — Never play alone" />
    <meta name="twitter:description" content="Find pickup games near you — real people, real time, one tap away." />
    <meta name="twitter:image" content="https://playpin.vercel.app/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
